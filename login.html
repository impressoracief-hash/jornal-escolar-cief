<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Jornal Escolar</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="login-bg">
      <div class="login-card">
        <img src="logo.png" alt="Logo da Escola" class="login-logo-escola">
        <div class="login-logo">📰</div>
        <h1>Jornal Escolar</h1>
        <p class="login-sub">Painel de Administração</p>

        <form id="form-login" novalidate>
          <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="admin@escola.com" required autocomplete="username" />
          </div>
          <div class="campo">
            <label for="senha">Senha</label>
            <div class="senha-wrapper">
              <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
              <button type="button" class="toggle-senha" onclick="toggleSenha()" aria-label="Mostrar senha">👁️</button>
            </div>
          </div>

          <div class="erro" id="erro-login" role="alert"></div>

          <button type="submit" class="btn-login" id="btn-entrar">
            <span id="btn-texto">Entrar</span>
            <span id="btn-loading" style="display:none;">⏳ Entrando…</span>
          </button>
        </form>
      </div>
    </div>

    <script type="module">
      import { auth } from "./firebase.js";
      import {
        signInWithEmailAndPassword,
        onAuthStateChanged
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      // Se já estiver logado, vai direto pro admin
      onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "admin.html";
      });

      document.getElementById("form-login").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;
        const erro  = document.getElementById("erro-login");
        const btnTexto   = document.getElementById("btn-texto");
        const btnLoading = document.getElementById("btn-loading");
        const btn        = document.getElementById("btn-entrar");

        erro.textContent = "";
        btnTexto.style.display   = "none";
        btnLoading.style.display = "inline";
        btn.disabled = true;

        try {
          await signInWithEmailAndPassword(auth, email, senha);
          window.location.href = "admin.html";
        } catch (err) {
          const msgs = {
            "auth/user-not-found":   "E-mail não encontrado.",
            "auth/wrong-password":   "Senha incorreta.",
            "auth/invalid-email":    "E-mail inválido.",
            "auth/too-many-requests":"Muitas tentativas. Tente novamente mais tarde.",
            "auth/invalid-credential": "E-mail ou senha incorretos."
          };
          erro.textContent = msgs[err.code] || "Erro ao entrar. Tente novamente.";
        } finally {
          btnTexto.style.display   = "inline";
          btnLoading.style.display = "none";
          btn.disabled = false;
        }
      });

      window.toggleSenha = function() {
        const input = document.getElementById("senha");
        input.type = input.type === "password" ? "text" : "password";
      };
    </script>
  </body>
</html>
